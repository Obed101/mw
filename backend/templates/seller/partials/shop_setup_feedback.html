<div class="alert alert-{{ 'success' if tone == 'success' else 'danger' }} border-0 shadow-sm mb-0" role="alert">
    <div class="d-flex align-items-center gap-2">
        <i class="bi {{ 'bi-check-circle-fill' if tone == 'success' else 'bi-exclamation-triangle-fill' }}"></i>
        <span>{{ message }}</span>
    </div>
</div>
