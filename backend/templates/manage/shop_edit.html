{% extends "manage/base_manage.html" %}

{% block manage_content %}
<div class="card-manage">
    <div class="p-4 bg-white border-bottom">
        <h2 class="h5 fw-bold mb-1">Edit Shop Profile</h2>
        <p class="text-muted small mb-0">Update your shop's public information, location, and contact details.</p>
    </div>
    
    <div class="p-4">
        <form action="{{ url_for('manage_bp.edit_shop_page') }}" method="POST" class="row g-4">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="col-12 col-md-6">
                <label class="form-label fw-bold small">Shop Name</label>
                <input type="text" name="name" class="form-control" value="{{ shop.name }}" required>
            </div>
            
            <div class="col-12 col-md-6">
                <label class="form-label fw-bold small">Phone Number</label>
                <input type="tel" name="phone" class="form-control" value="{{ shop.phone or '' }}" placeholder="+233 ...">
            </div>

            <div class="col-12 col-md-6">
                <label class="form-label fw-bold small">Email Address</label>
                <input type="email" name="email" class="form-control" value="{{ shop.email or '' }}" placeholder="shop@example.com">
            </div>

            <div class="col-12 col-md-6">
                <label class="form-label fw-bold small">Town / City</label>
                <input type="text" name="town" class="form-control" value="{{ shop.town or '' }}" placeholder="e.g. Accra">
            </div>

            <div class="col-12">
                <label class="form-label fw-bold small">Shop Description</label>
                <textarea name="description" class="form-control" rows="4" placeholder="Tell customers about your shop...">{{ shop.description or '' }}</textarea>
            </div>

            <div class="col-12">
                <label class="form-label fw-bold small">Address / Landmark</label>
                <input type="text" name="address" class="form-control" value="{{ shop.address or '' }}" placeholder="e.g. Near the main market square">
            </div>

            <div class="col-12 d-flex justify-content-between align-items-center mt-5">
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" name="is_active" id="shop-active" {% if shop.is_active %}checked{% endif %}>
                    <label class="form-check-label fw-bold" for="shop-active">Shop is Active (Visible to public)</label>
                </div>
                <button type="submit" class="btn btn-primary px-4">Save Changes</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
