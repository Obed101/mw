


<tr id="product-row-{{ product.id }}">
    <td class="ps-4">
        {% if product.primary_image_url %}
        <div class="product-row-img-wrap has-image"
             data-image-urls='{{ product.image_urls | tojson }}'>
            <img src="{{ product.primary_image_url }}" class="product-row-img" alt="">
            <div class="product-row-img-edit-overlay" style="cursor:pointer" title="Edit images">
                <i class="bi bi-pencil-fill"></i>
            </div>
        </div>
        {% else %}
        <div class="product-row-img-wrap no-image"
             data-image-urls='[]'>
            <div class="product-row-img d-flex align-items-center justify-content-center text-muted">
                <i class="bi bi-image"></i>
            </div>
            <div class="product-row-img-edit-overlay always-visible" style="cursor:pointer" title="Add images">
                <i class="bi bi-pencil-fill"></i>
            </div>
        </div>
        {% endif %}
    </td>
    <td>
        <div class="fw-bold">{{ product.name }}
            {% if product.is_active %}
            <i class="bi bi-check-circle text-success"></i>
            {% else %}
            <i class="bi bi-x-circle text-warning"></i>
            {% endif %}
        </div>
        <div class="d-flex align-items-center gap-2 mt-1">
            <span class="text-muted rounded-pill badge bg-body-secondary small">{{ product.code or 'No Code' }}</span>
        </div>
    </td>
    <td class="text-center fw-semibold">
        GHS {{ "%.2f"|format(product.price) }}
    </td>
    <td class="text-center" id="stock-cell-{{ product.id }}">
        {% include "manage/partials/stock_badge.html" %}
    </td>
    <td class="pe-4 text-end">
        <div class="btn-group btn-group-sm">
            <button class="btn btn-outline-primary" 
                    hx-get="{{ url_for('manage_bp.edit_product', product_id=product.id) }}"
                    hx-target="#product-row-{{ product.id }}"
                    hx-swap="outerHTML">
                <i class="bi bi-pencil"></i>
            </button>
            <button class="btn btn-outline-danger"
                    hx-post="{{ url_for('manage_bp.delete_product', product_id=product.id) }}"
                    hx-confirm="Are you sure you want to delete '{{ product.name }}'?"
                    hx-target="#product-row-{{ product.id }}"
                    hx-swap="outerHTML">
                <i class="bi bi-trash"></i>
            </button>
        </div>
    </td>
</tr>
