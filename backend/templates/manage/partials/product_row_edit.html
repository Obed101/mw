<tr id="product-row-{{ product.id }}" class="table-info">
    <td colspan="5" class="p-0">
        <form hx-post="{{ url_for('manage_bp.edit_product', product_id=product.id) }}"
              hx-target="#product-row-{{ product.id }}"
              hx-swap="outerHTML"
              class="m-0 p-3">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="row g-2 align-items-center">
                <div class="col-12 col-md-3">
                    <input type="text" name="name" class="form-control form-control-sm" value="{{ product.name }}" required>
                </div>
                <div class="col-6 col-md-2" id="category-field-{{ product.id }}">
                    <input type="text" name="category_name" list="category-list-{{ product.id }}" 
                           class="form-control form-control-sm" 
                           value="{{ product.category.name if product.category else '' }}" 
                           required placeholder="Category..."
                           hx-get="{{ url_for('manage_bp.search_categories') }}"
                           hx-trigger="keyup changed delay:200ms"
                           hx-target="#category-list-{{ product.id }}">
                    <datalist id="category-list-{{ product.id }}">
                        {% for c in categories %}
                        <option value="{{ c.name }}">
                        {% endfor %}
                    </datalist>
                </div>
                <div class="col-6 col-md-2">
                    <div class="input-group input-group-sm">
                        <span class="input-group-text">GHS</span>
                        <input type="number" name="price" step="0.01" class="form-control" value="{{ product.price }}" required>
                    </div>
                </div>
                <div class="col-6 col-md-2">
                    <input type="number" name="stock" class="form-control form-control-sm" value="{{ product.stock }}" required>
                </div>
                <div class="col-6 col-md-2 d-flex align-items-center">
                    <div class="form-check form-switch mb-0">
                        <input class="form-check-input" type="checkbox" name="is_active" id="active-{{ product.id }}" {% if product.is_active %}checked{% endif %}>
                        <label class="form-check-label small" for="active-{{ product.id }}">Active</label>
                    </div>
                </div>
                <div class="col-6 col-md-3 text-end">
                    <button type="button" class="btn btn-light btn-sm me-1" 
                            hx-get="{{ url_for('manage_bp.product_list') }}" 
                            hx-target="#product-list-container">
                        Cancel
                    </button>
                    <button type="submit" class="btn btn-primary btn-sm">Save</button>
                </div>
            </div>
        </form>
    </td>
</tr>
