{% extends "base.html" %}

{% block title %}Notifications - Market Window{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row mb-4">
        <div class="col-12">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-3 mb-4">
                <h1 class="h3 fw-bold mb-0">
                    <i class="bi bi-bell text-primary me-2"></i>
                    Notifications
                </h1>
                <div class="d-flex gap-2">
                    <button class="btn btn-sm btn-outline-secondary" id="mark-all-read">
                        <i class="bi bi-check2 me-1"></i>Mark All Read
                    </button>
                    <button class="btn btn-sm btn-outline-danger" id="clear-all">
                        <i class="bi bi-trash me-1"></i>Clear All
                    </button>
                    {% if current_user.can_access_admin() %}
                    <a href="{{ url_for('support_bp.admin_support_inbox') }}" class="btn btn-sm" style="background:#6366f1; color:white; border-color:#6366f1;">
                        <i class="bi bi-headset me-1"></i>Inbox
                    </a>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="notification-filters mb-4">
                <div class="btn-group" role="group">
                    <input type="radio" class="btn-check" name="filter" id="filter-all" autocomplete="off" checked>
                    <label class="btn btn-outline-primary" for="filter-all">
                        <i class="bi bi-inbox me-1"></i>All
                    </label>
                    
                    <input type="radio" class="btn-check" name="filter" id="filter-unread" autocomplete="off">
                    <label class="btn btn-outline-primary" for="filter-unread">
                        <i class="bi bi-circle me-1"></i>Unread
                    </label>
                    
                    <input type="radio" class="btn-check" name="filter" id="filter-personal" autocomplete="off">
                    <label class="btn btn-outline-primary" for="filter-personal">
                        <i class="bi bi-person me-1"></i>Personal
                    </label>
                    
                    <input type="radio" class="btn-check" name="filter" id="filter-shops" autocomplete="off">
                    <label class="btn btn-outline-primary" for="filter-shops">
                        <i class="bi bi-shop me-1"></i>Shops
                    </label>
                    
                    <input type="radio" class="btn-check" name="filter" id="filter-products" autocomplete="off">
                    <label class="btn btn-outline-primary" for="filter-products">
                        <i class="bi bi-box me-1"></i>Products
                    </label>
                </div>
            </div>

            <div class="notification-list-main" id="notifications-container">
                <!-- Notifications will be loaded here -->
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2 text-muted">Loading notifications...</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block styles %}
<style>
.notification-filters {
    background: white;
    padding: 1rem;
    border-radius: 12px;
    border: 1px solid var(--border-light);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
}

.btn-check {
    display: none;
}

.btn-check:checked + .btn {
    background: var(--gradient-primary);
    border-color: transparent;
    color: white;
}

.notification-list-main {
    max-height: 70vh;
    overflow-y: auto;
}

.notification-card {
    background: white;
    border: 1px solid var(--border-light);
    border-radius: 12px;
    padding: 0;
    margin-bottom: 1rem;
    transition: all 0.3s ease;
    cursor: pointer;
}

.notification-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(107, 70, 193, 0.1);
    border-color: var(--primary-purple);
}

.notification-card.unread {
    border-left: 4px solid var(--primary-purple);
    background: linear-gradient(90deg, rgba(107, 70, 193, 0.02) 0%, white 50%);
}

.notification-card-body {
    padding: 1.25rem;
    display: flex;
    gap: 1rem;
    align-items: flex-start;
}

.notification-actions {
    margin-left: auto;
    display: flex;
    gap: 0.5rem;
}

.notification-btn {
    padding: 0.375rem 0.75rem;
    font-size: 0.8rem;
    border-radius: 6px;
    border: none;
    transition: all 0.2s ease;
}

.notification-btn:hover {
    transform: translateY(-1px);
}

.notification-btn.mark-read {
    background: var(--light-mauve);
    color: var(--primary-purple);
}

.notification-btn.mark-read:hover {
    background: var(--primary-purple);
    color: white;
}

.notification-btn.delete {
    background: #fef2f2;
    color: #dc2626;
}

.notification-btn.delete:hover {
    background: #dc2626;
    color: white;
}

.empty-state {
    text-align: center;
    padding: 3rem 1rem;
}

.empty-state-icon {
    width: 80px;
    height: 80px;
    background: var(--light-mauve);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.5rem;
    font-size: 2rem;
    color: var(--primary-purple);
}

@media (max-width: 768px) {
    .notification-card-body {
        flex-direction: column;
        gap: 0.75rem;
    }
    
    .notification-actions {
        margin-left: 0;
        margin-top: 0.5rem;
    }
    
    .btn-group {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
    }
    
    .btn-group .btn {
        flex: 1;
        min-width: calc(50% - 0.25rem);
    }
}
</style>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const csrfToken = document.querySelector('meta[name="csrf-token"]').content;
    const rawNotifications = {{ notifications | tojson | safe }};
    
    let appNotifications = rawNotifications.map(n => {
        let nType = 'system';
        if (n.notification_type) {
            if (n.notification_type.includes('shop')) nType = 'shop';
            else if (n.notification_type.includes('product') || n.notification_type.includes('stock')) nType = 'product';
            else if (n.notification_type.includes('support')) nType = 'personal';
            else if (n.notification_type.includes('user') || n.notification_type.includes('profile')) nType = 'personal';
        }
        return {
            id: n.id,
            type: nType,
            title: n.title,
            message: n.message,
            time: n.created_at_label || 'Recently',
            read: n.is_read,
            icon: n.icon || 'bell',
            url: n.action_url || null
        };
    });

    function renderNotifications(filter = 'all') {
        const container = document.getElementById('notifications-container');
        const filteredNotifications = filter === 'all' ? appNotifications : 
            filter === 'unread' ? appNotifications.filter(n => !n.read) :
            appNotifications.filter(n => n.type === filter);

        if (filteredNotifications.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">
                        <i class="bi bi-bell-slash"></i>
                    </div>
                    <h4 class="text-muted">No notifications</h4>
                    <p class="text-muted">You're all caught up! Check back later for new updates.</p>
                </div>
            `;
            return;
        }

        container.innerHTML = filteredNotifications.map(notification => `
            <div class="notification-card ${!notification.read ? 'unread' : ''}" data-id="${notification.id}" ${notification.url ? `onclick="if(!event.target.closest('.notification-actions')) window.location.href='${notification.url}'"` : ''}>
                <div class="notification-card-body">
                    <div class="notification-icon ${notification.icon} ${!notification.read ? 'unread' : ''}">
                        <i class="bi bi-${getIconForType(notification.icon)}"></i>
                    </div>
                    <div class="notification-content">
                        <div class="notification-title">${notification.title}</div>
                        <div class="notification-message">${notification.message}</div>
                        <div class="notification-time">${notification.time}</div>
                    </div>
                    <div class="notification-actions">
                        ${!notification.read ? `
                            <button class="notification-btn mark-read" onclick="markAsRead(${notification.id})">
                                <i class="bi bi-check2"></i>
                            </button>
                        ` : ''}
                        <button class="notification-btn delete" onclick="deleteNotification(${notification.id})">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function getIconForType(icon) {
        const icons = {
            'support': 'headset',
            'product': 'box-seam',
            'system': 'bell',
            'user': 'person',
            'shop': 'shop',
        };
        return icons[icon] || 'bell';
    }

    window.markAsRead = function(id) {
        fetch(`/notifications/${id}/read`, {
            method: 'POST',
            headers: {'X-CSRFToken': csrfToken}
        }).then(() => {
            const notification = appNotifications.find(n => n.id === id);
            if (notification) {
                notification.read = true;
                renderNotifications(getCurrentFilter());
                document.dispatchEvent(new CustomEvent('mw:notification-read'));
            }
        });
    }

    window.deleteNotification = function(id) {
        fetch(`/notifications/${id}`, {
            method: 'DELETE',
            headers: {'X-CSRFToken': csrfToken}
        }).then(() => {
            const index = appNotifications.findIndex(n => n.id === id);
            if (index > -1) {
                appNotifications.splice(index, 1);
                renderNotifications(getCurrentFilter());
                document.dispatchEvent(new CustomEvent('mw:notification-read'));
            }
        });
    }

    function markAllAsRead() {
        const unreadIds = appNotifications.filter(n => !n.read).map(n => n.id);
        if (unreadIds.length === 0) return;
        
        document.getElementById('mark-all-read').disabled = true;
        fetch('/notifications/read-all', {
            method: 'POST',
            headers: {'X-CSRFToken': csrfToken}
        }).then(() => {
            appNotifications.forEach(n => n.read = true);
            renderNotifications(getCurrentFilter());
            document.dispatchEvent(new CustomEvent('mw:notification-read'));
        }).finally(() => {
            document.getElementById('mark-all-read').disabled = false;
        });
    }

    function clearAll() {
        if (appNotifications.length === 0) return;
        
        if (confirm('Are you sure you want to clear all notifications?')) {
            document.getElementById('clear-all').disabled = true;
            fetch('/notifications/clear-all', {
                method: 'DELETE',
                headers: {'X-CSRFToken': csrfToken}
            }).then(() => {
                appNotifications = [];
                renderNotifications(getCurrentFilter());
                document.dispatchEvent(new CustomEvent('mw:notification-read'));
            }).finally(() => {
                document.getElementById('clear-all').disabled = false;
            });
        }
    }

    function getCurrentFilter() {
        const checkedFilter = document.querySelector('input[name="filter"]:checked');
        return checkedFilter ? checkedFilter.id.replace('filter-', '') : 'all';
    }

    // Event listeners
    document.getElementById('mark-all-read').addEventListener('click', markAllAsRead);
    document.getElementById('clear-all').addEventListener('click', clearAll);
    
    document.querySelectorAll('input[name="filter"]').forEach(radio => {
        radio.addEventListener('change', () => {
            renderNotifications(getCurrentFilter());
        });
    });

    // Initial render
    renderNotifications(getCurrentFilter());
});
</script>
{% endblock %}
