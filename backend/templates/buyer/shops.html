{% extends "base.html" %}

{% block title %}Shops - Market Window{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row mb-4">
        <div class="col-12 d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-3">
            <h1 class="fw-bold">Shops</h1>
            <div class="align-items-center gap-3">
                <a href="{{ url_for('main_bp.add_shop', new=1) if current_user.is_authenticated else url_for('main_bp.login', next=url_for('main_bp.add_shop', new=1)) }}" class="btn btn-sm btn-primary">
                    <i class="bi bi-plus-lg me-1"></i>Add Shop
                </a>
            </div>
        </div>
    </div>

    <!-- Location Prompt Banner -->
    <div id="location-prompt-banner" class="alert alert-info d-none align-items-center justify-content-between mb-4 border-0 shadow-sm" style="background: linear-gradient(135deg, #1e1b4b, #312e81); color: #e0e7ff; border-radius: 12px; padding: 16px 20px;">
        <div class="d-flex align-items-center gap-3">
            <div class="rounded-circle d-flex align-items-center justify-content-center" style="background: rgba(99, 102, 241, 0.2); width: 42px; height: 42px; flex-shrink: 0;">
                <i class="bi bi-geo-alt-fill" style="font-size: 1.2rem; color: #a5b4fc;"></i>
            </div>
            <div>
                <h6 class="mb-0 fw-semibold text-white">Find shops near you</h6>
                <p class="mb-0 small" style="color: #c7d2fe;">Allow location access to show the nearest shops in your area.</p>
            </div>
        </div>
        <button class="btn btn-sm btn-light fw-semibold text-primary px-3 rounded-pill" onclick="mwRequestLocationPermission()">Enable Location</button>
    </div>

    <div x-data="{ showExtraCriteria: false }" class="mb-4">
        <div class="row g-3 align-items-center">
            <div class="col-md-8">
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-search"></i></span>
                    <input
                        type="text"
                        class="form-control"
                        name="search"
                        placeholder="Search shops by name, description, location..."
                        hx-get="{{ url_for('buyer_bp.browse_shops') }}"
                        hx-trigger="keyup changed delay:400ms"
                        hx-target="#shops-container"
                        hx-include="[name='sort_by'], [name='category_id']"
                        hx-swap="innerHTML"
                    >
                </div>
            </div>
            <div class="col-md-4 text-md-end">
                <button
                    type="button"
                    class="btn btn-outline-secondary btn-sm"
                    @click="showExtraCriteria = !showExtraCriteria"
                    :aria-expanded="showExtraCriteria.toString()"
                >
                    Extra Search Criteria
                    <i class="bi ms-1" :class="showExtraCriteria ? 'bi-caret-up-fill' : 'bi-caret-down-fill'"></i>
                </button>
            </div>
        </div>

        <div class="row g-3 mt-1" x-show="showExtraCriteria" x-transition>
            <div class="col-md-6">
                <select
                    class="form-select"
                    name="category_id"
                    hx-get="{{ url_for('buyer_bp.browse_shops') }}"
                    hx-trigger="change"
                    hx-target="#shops-container"
                    hx-include="[name='search'], [name='sort_by']"
                    hx-swap="innerHTML"
                >
                    <option value="">All Categories</option>
                    {% for category in categories %}
                    <option value="{{ category.id }}">{{ category.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6">
                <select
                    class="form-select"
                    name="sort_by"
                    hx-get="{{ url_for('buyer_bp.browse_shops') }}"
                    hx-trigger="change"
                    hx-target="#shops-container"
                    hx-include="[name='search'], [name='category_id']"
                    hx-swap="innerHTML"
                >
                    <option value="nearest" selected>Sort by Nearest</option>
                    <option value="name">Sort by Name</option>
                    <option value="last_updated">Newest</option>
                    <option value="promoted">Promoted First</option>
                </select>
            </div>
        </div>
    </div>

    <div
        class="market-grid market-grid-shops"
        id="shops-container"
        hx-get="{{ url_for('buyer_bp.browse_shops') }}"
        hx-trigger="load"
        hx-target="#shops-container"
        hx-swap="innerHTML"
    >
        <div class="market-grid-full text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden text-light">Loading shops...</span>
            </div>
            <p class="mt-2 text-mw">Loading shops...</p>
        </div>
    </div>
    <div id="shops-load-spinner" class="htmx-indicator text-center py-3">
        <div class="spinner-border spinner-border-sm text-primary" role="status">
            <span class="visually-hidden">Loading more shops...</span>
        </div>
        <span class="ms-2 text-muted small">Loading more shops...</span>
    </div>

    <div class="text-center mt-4" id="load-more-container"></div>
</div>
{% endblock %}
