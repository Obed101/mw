{% extends "base.html" %}

{% block title %}Shops - Market Window{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row mb-4">
        <div class="col-12 d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-3">
            <h1 class="fw-bold">Browse Shops</h1>
            <div class="d-flex align-items-center gap-3">
                <a href="{{ url_for('main_bp.add_shop') if current_user.is_authenticated else url_for('main_bp.login', next=url_for('main_bp.add_shop')) }}" class="btn btn-primary fw-bold">
                    <i class="bi bi-shop-window me-2"></i>ADD YOUR SHOP
                </a>
            </div>
        </div>
    </div>

    <div x-data="{ showExtraCriteria: false, verifiedOnly: true }" class="mb-4">
        <input type="hidden" name="verified_only" :value="verifiedOnly ? 'true' : 'false'">
        <div class="row g-3 align-items-center">
            <div class="col-md-8">
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-search"></i></span>
                    <input
                        type="text"
                        class="form-control"
                        name="search"
                        placeholder="Search shops by name, description, location..."
                        hx-get="{{ url_for('buyer_bp.browse_shops') }}"
                        hx-trigger="keyup changed delay:400ms"
                        hx-target="#shops-container"
                        hx-include="[name='sort_by'], [name='category_id'], [name='verified_only']"
                        hx-swap="innerHTML"
                    >
                </div>
            </div>
            <div class="col-md-4 text-md-end">
                <button
                    type="button"
                    class="btn btn-outline-secondary btn-sm"
                    @click="showExtraCriteria = !showExtraCriteria"
                    :aria-expanded="showExtraCriteria.toString()"
                >
                    Extra Search Criteria
                    <i class="bi ms-1" :class="showExtraCriteria ? 'bi-caret-up-fill' : 'bi-caret-down-fill'"></i>
                </button>
            </div>
        </div>

        <div class="row g-3 mt-1" x-show="showExtraCriteria" x-transition>
            <div class="col-md-6">
                <select
                    class="form-select"
                    name="category_id"
                    hx-get="{{ url_for('buyer_bp.browse_shops') }}"
                    hx-trigger="change"
                    hx-target="#shops-container"
                    hx-include="[name='search'], [name='sort_by'], [name='verified_only']"
                    hx-swap="innerHTML"
                >
                    <option value="">All Categories</option>
                    {% for category in categories %}
                    <option value="{{ category.id }}">{{ category.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6">
                <select
                    class="form-select"
                    name="sort_by"
                    hx-get="{{ url_for('buyer_bp.browse_shops') }}"
                    hx-trigger="change"
                    hx-target="#shops-container"
                    hx-include="[name='search'], [name='category_id'], [name='verified_only']"
                    hx-swap="innerHTML"
                >
                    <option value="name" selected>Sort by Name</option>
                    <option value="last_updated">Newest</option>
                    <option value="promoted">Promoted First</option>
                </select>
            </div>
            <div class="col-md-6">
                <div class="form-check form-switch d-flex align-items-center gap-2 mt-2">
                    <input
                        class="form-check-input"
                        type="checkbox"
                        role="switch"
                        id="verified-only-toggle"
                        x-model="verifiedOnly"
                        checked
                        hx-get="{{ url_for('buyer_bp.browse_shops') }}"
                        hx-trigger="change"
                        hx-target="#shops-container"
                        hx-include="[name='search'], [name='category_id'], [name='sort_by'], [name='verified_only']"
                        hx-swap="innerHTML"
                    >
                    <label class="form-check-label fw-semibold" for="verified-only-toggle">
                        Verified Shops Only
                    </label>
                </div>
            </div>
        </div>
    </div>

    <div
        class="market-grid market-grid-shops"
        id="shops-container"
        hx-get="{{ url_for('buyer_bp.browse_shops') }}"
        hx-trigger="load"
        hx-target="#shops-container"
        hx-swap="innerHTML"
    >
        <div class="market-grid-full text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden text-light">Loading shops...</span>
            </div>
            <p class="mt-2 text-mw">Loading shops...</p>
        </div>
    </div>

    <div class="text-center mt-4" id="load-more-container"></div>
</div>
{% endblock %}
