<div class="favorite-shop-wrapper">
    <button
        type="button"
        class="btn btn-sm {% if is_favorited %}btn-outline-danger{% else %}btn-outline-primary{% endif %} favorite-toggle-btn"
        hx-post="{{ url_for('buyer_bp.follow_shop', shop_id=shop_id) }}"
        hx-target="closest .favorite-shop-wrapper"
        hx-swap="outerHTML"
    >
        <i class="bi {% if is_favorited %}bi-heart-fill{% else %}bi-heart{% endif %} me-1"></i><span class="favorite-btn-label">{% if is_favorited %}Following{% else %}Follow{% endif %}</span>
    </button>
</div>
