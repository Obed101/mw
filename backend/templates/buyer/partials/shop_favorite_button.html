<div class="favorite-shop-wrapper">
    {% if is_favorited %}
    <button
        type="button"
        class="btn btn-sm btn-outline-danger favorite-toggle-btn"
        hx-delete="{{ url_for('buyer_bp.unfollow_shop', shop_id=shop_id) }}"
        hx-target="closest .favorite-shop-wrapper"
        hx-swap="outerHTML"
    >
        <i class="bi bi-heart-fill me-1"></i><span class="favorite-btn-label">Following</span>
    </button>
    {% else %}
    <button
        type="button"
        class="btn btn-sm btn-outline-primary favorite-toggle-btn"
        hx-post="{{ url_for('buyer_bp.follow_shop', shop_id=shop_id) }}"
        hx-target="closest .favorite-shop-wrapper"
        hx-swap="outerHTML"
    >
        <i class="bi bi-heart me-1"></i><span class="favorite-btn-label">Follow</span>
    </button>
    {% endif %}
</div>
